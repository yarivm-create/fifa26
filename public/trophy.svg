<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="World Cup trophy">
  <defs>
    <linearGradient id="wcTrophyGold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f7e08a"/>
      <stop offset="0.45" stop-color="#e2bd4e"/>
      <stop offset="1" stop-color="#b07d18"/>
    </linearGradient>
    <linearGradient id="wcTrophyGlobe" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fbeea6"/>
      <stop offset="1" stop-color="#c9971f"/>
    </linearGradient>
  </defs>
  <!-- Globe held aloft -->
  <circle cx="32" cy="15" r="9" fill="url(#wcTrophyGlobe)" stroke="#8a5e10" stroke-width="1"/>
  <path d="M23.4 13.2h17.2M24.6 18.6h14.8M32 6v18" fill="none" stroke="#8a5e10" stroke-width="1" opacity="0.55"/>
  <!-- Twisting figures / body of the cup -->
  <path d="M24 22 C24 33 28 40 32 44 C36 40 40 33 40 22 C37 25 35 27 32 27 C29 27 27 25 24 22 Z" fill="url(#wcTrophyGold)" stroke="#8a5e10" stroke-width="1"/>
  <!-- Stem -->
  <rect x="29.5" y="43" width="5" height="6" rx="1" fill="url(#wcTrophyGold)" stroke="#8a5e10" stroke-width="0.8"/>
  <!-- Plinth -->
  <path d="M22 49h20l-2 5H24z" fill="url(#wcTrophyGold)" stroke="#8a5e10" stroke-width="1"/>
  <rect x="20" y="54" width="24" height="5" rx="1.5" fill="url(#wcTrophyGold)" stroke="#8a5e10" stroke-width="1"/>
</svg>
