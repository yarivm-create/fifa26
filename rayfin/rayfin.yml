app:
  name: worldcup2026-live
  description: Live FIFA World Cup 2026 Dashboard

database:
  tables:
    - name: matches
      columns:
        - name: id
          type: integer
          primaryKey: true
        - name: home_team
          type: string
        - name: away_team
          type: string
        - name: home_score
          type: integer
          nullable: true
        - name: away_score
          type: integer
          nullable: true
        - name: status
          type: string
        - name: group
          type: string
          nullable: true
        - name: stage
          type: string
        - name: venue
          type: string
        - name: datetime
          type: datetime
        - name: updated_at
          type: datetime

    - name: teams
      columns:
        - name: id
          type: integer
          primaryKey: true
        - name: name
          type: string
        - name: code
          type: string
        - name: group
          type: string
        - name: flag_url
          type: string
          nullable: true

    - name: standings
      columns:
        - name: id
          type: integer
          primaryKey: true
          autoIncrement: true
        - name: team_id
          type: integer
        - name: group
          type: string
        - name: played
          type: integer
        - name: won
          type: integer
        - name: drawn
          type: integer
        - name: lost
          type: integer
        - name: goals_for
          type: integer
        - name: goals_against
          type: integer
        - name: points
          type: integer
